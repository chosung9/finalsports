<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINAL · 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#cb1f2f;--red-deep:#9e1824;--bg:#0b0d0c;--panel:#111313;--mid:#161818;--line:rgba(255,255,255,.08);--t50:rgba(255,255,255,.5);--t25:rgba(255,255,255,.25);}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#fff;min-height:100vh;}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px;}

/* 로그인 */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:100%;max-width:360px;background:var(--panel);border:0.5px solid var(--line);border-top:2px solid var(--red);padding:38px 30px;}
.login-card h1{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;margin-bottom:2px;}
.login-card .sub{font-size:12px;color:var(--t50);margin-bottom:26px;letter-spacing:.5px;}
.login-card label{display:block;font-size:11px;color:var(--t50);margin:0 0 6px;letter-spacing:.5px;}
.login-card input{width:100%;padding:12px 13px;margin-bottom:16px;background:var(--mid);border:0.5px solid var(--line);color:#fff;font-family:inherit;font-size:14px;border-radius:2px;}
.login-card input:focus{outline:none;border-color:var(--red);}
.login-card .err{font-size:11px;color:#ff6b6b;min-height:16px;margin-bottom:10px;}
.btn-red{width:100%;padding:13px;background:var(--red);color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border-radius:2px;transition:background .2s;}
.btn-red:hover{background:var(--red-deep);}

/* 대시보드 */
#dash{display:none;padding:0 0 80px;}
.topbar{position:sticky;top:0;z-index:10;background:rgba(11,13,12,.94);backdrop-filter:blur(14px);border-bottom:0.5px solid var(--line);}
.topbar .wrap{height:62px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;display:flex;align-items:center;gap:10px;}
.brand .dot{color:var(--red);}
.top-actions{display:flex;gap:10px;}
.top-actions a,.top-actions button{font-family:inherit;font-size:12px;font-weight:600;color:#fff;background:transparent;border:0.5px solid var(--t25);padding:8px 14px;border-radius:2px;cursor:pointer;text-decoration:none;transition:all .2s;}
.top-actions a:hover,.top-actions button:hover{border-color:var(--red);}

.section-h{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--t50);margin:38px 0 16px;display:flex;align-items:center;gap:10px;}
.section-h::after{content:'';flex:1;height:0.5px;background:var(--line);}

.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.card{background:var(--panel);border:0.5px solid var(--line);padding:18px 16px;border-radius:4px;}
.card .n{font-size:30px;font-weight:700;line-height:1;}
.card .n.red{color:var(--red);}
.card .l{font-size:11px;color:var(--t50);margin-top:8px;letter-spacing:.3px;}
@media(max-width:720px){.cards{grid-template-columns:repeat(2,1fr);}}

.panel{background:var(--panel);border:0.5px solid var(--line);border-radius:4px;padding:20px;}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
@media(max-width:860px){.grid2{grid-template-columns:1fr;}}

svg{width:100%;height:auto;display:block;}
.legend{display:flex;gap:16px;font-size:11px;color:var(--t50);margin-bottom:10px;}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{text-align:left;padding:11px 10px;border-bottom:0.5px solid var(--line);}
th{font-size:11px;color:var(--t50);font-weight:600;letter-spacing:.3px;}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
tbody tr:hover{background:rgba(255,255,255,.02);}
.muted{color:var(--t50);}
.del-btn{background:transparent;border:0.5px solid var(--t25);color:var(--t50);font-size:11px;padding:5px 10px;border-radius:2px;cursor:pointer;font-family:inherit;}
.del-btn:hover{border-color:var(--red);color:#ff6b6b;}
.empty{padding:34px;text-align:center;color:var(--t50);font-size:13px;}
.inq-content{max-width:340px;white-space:pre-wrap;word-break:break-word;color:rgba(255,255,255,.85);}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(203,31,47,.15);color:#ff8088;letter-spacing:.3px;}
</style>
</head>
<body>

<!-- ───── 로그인 ───── -->
<div id="login">
  <div class="login-card">
    <h1>ADMIN</h1>
    <div class="sub">파이널체대입시 관리자</div>
    <label>이메일</label>
    <input type="email" id="email" placeholder="admin@example.com" autocomplete="username">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password">
    <div class="err" id="err"></div>
    <button class="btn-red" id="loginBtn">로그인</button>
  </div>
</div>

<!-- ───── 대시보드 ───── -->
<div id="dash">
  <div class="topbar">
    <div class="wrap">
      <div class="brand">FINAL <span class="dot">·</span> 관리자</div>
      <div class="top-actions">
        <a href="index.html">← 홈페이지</a>
        <button id="refreshBtn">새로고침</button>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="section-h">방문자</div>
    <div class="cards">
      <div class="card"><div class="n red" id="cToday">0</div><div class="l">오늘 방문 (유입)</div></div>
      <div class="card"><div class="n" id="cTodayPv">0</div><div class="l">오늘 페이지뷰</div></div>
      <div class="card"><div class="n" id="cYest">0</div><div class="l">어제 방문</div></div>
      <div class="card"><div class="n" id="c7">0</div><div class="l">최근 7일 방문</div></div>
      <div class="card"><div class="n" id="cMonth">0</div><div class="l">이번 달 방문</div></div>
    </div>

    <div class="grid2" style="margin-top:16px;">
      <div class="panel">
        <div class="legend"><span><i style="background:rgba(203,31,47,.35);"></i>페이지뷰</span><span><i style="background:var(--red);"></i>방문(유입)</span></div>
        <div id="chart"></div>
      </div>
      <div class="panel" style="padding:0;overflow:hidden;">
        <table>
          <thead><tr><th>일자</th><th class="num">페이지뷰</th><th class="num">방문</th></tr></thead>
          <tbody id="daysBody"></tbody>
        </table>
      </div>
    </div>

    <div class="section-h">페이지별 조회수</div>
    <div class="panel" style="padding:0;overflow-x:auto;">
      <table>
        <thead><tr><th>페이지</th><th class="num">오늘</th><th class="num">이번 달</th><th class="num">누적</th></tr></thead>
        <tbody id="pageBody"></tbody>
      </table>
    </div>

    <div class="section-h">문의 내역 <span id="inqCount" class="badge" style="margin-left:4px;">0</span></div>
    <div class="panel" style="padding:0;overflow-x:auto;">
      <table>
        <thead><tr><th>작성일</th><th>희망지역</th><th>이름</th><th>연락처</th><th>내용</th><th>페이지</th><th></th></tr></thead>
        <tbody id="inqBody"></tbody>
      </table>
      <div class="empty" id="inqEmpty" style="display:none;">접수된 문의가 없습니다.</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCScFQyl5ePnGrL2G-sxCdiNIvhnv5-TIs",
  authDomain: "final-homepage.firebaseapp.com",
  projectId: "final-homepage",
  storageBucket: "final-homepage.firebasestorage.app",
  messagingSenderId: "740775410303",
  appId: "1:740775410303:web:1e886fad619b19dc20dd4a"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth= getAuth(app);

const $ = id => document.getElementById(id);
function dayKey(d){ return (d||new Date()).toLocaleDateString('en-CA',{timeZone:'Asia/Seoul'}); }

/* ── 로그인 ── */
$('loginBtn').addEventListener('click', login);
$('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
async function login(){
  $('err').textContent='';
  try{ await signInWithEmailAndPassword(auth, $('email').value.trim(), $('pw').value); }
  catch(e){ $('err').textContent='로그인 실패 — 이메일 또는 비밀번호를 확인하세요.'; }
}
$('logoutBtn').addEventListener('click', ()=> signOut(auth));
$('refreshBtn').addEventListener('click', loadAll);

onAuthStateChanged(auth, user=>{
  if(user){ $('login').style.display='none'; $('dash').style.display='block'; loadAll(); }
  else { $('login').style.display='flex'; $('dash').style.display='none'; }
});

/* ── 데이터 로드 ── */
async function loadAll(){ await Promise.all([loadStats(), loadInquiries()]); }

const PAGE_LABEL={index:'메인 (홈)',about:'파이널 소개',history:'연혁',ai:'피지컬 AI',campus:'캠퍼스 현황',info:'입시 정보',community:'커뮤니티',partner:'파트너 모집'};

async function loadStats(){
  const snap = await getDocs(collection(db,'siteStats'));
  const m={}; snap.forEach(d=> m[d.id]=d.data());
  const today=dayKey(); const yd=new Date(); yd.setDate(yd.getDate()-1);
  const t=m[today]||{}, y=m[dayKey(yd)]||{};
  $('cToday').textContent=(t.visits||0);
  $('cTodayPv').textContent=(t.pv||0);
  $('cYest').textContent=(y.visits||0);
  let s7=0, sm=0; const ym=today.slice(0,7);
  for(let i=0;i<7;i++){ const d=new Date(); d.setDate(d.getDate()-i); const k=dayKey(d); if(m[k]) s7+=(m[k].visits||0); }
  Object.keys(m).forEach(k=>{ if(k.startsWith(ym)) sm+=(m[k].visits||0); });
  $('c7').textContent=s7; $('cMonth').textContent=sm;

  // 최근 14일 표 (페이지뷰 / 방문)
  const rows=[];
  for(let i=0;i<14;i++){ const d=new Date(); d.setDate(d.getDate()-i); const k=dayKey(d); const v=m[k]||{}; rows.push({k, pv:v.pv||0, visits:v.visits||0}); }
  $('daysBody').innerHTML = rows.map(r=>`<tr><td>${r.k}</td><td class="num">${r.pv}</td><td class="num">${r.visits}</td></tr>`).join('');

  // 최근 7일 차트 (오래된→최신)
  const week=[]; for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const k=dayKey(d); const v=m[k]||{}; week.push({k:k.slice(5), pv:v.pv||0, visits:v.visits||0}); }
  drawChart(week);

  // 페이지별 조회수 (오늘 / 이번 달 / 누적)
  const agg={};
  Object.entries(m).forEach(([date,v])=>{
    const pg=v.pages||{};
    Object.entries(pg).forEach(([pid,cnt])=>{
      if(!agg[pid]) agg[pid]={today:0,month:0,total:0};
      agg[pid].total+=cnt;
      if(date===today) agg[pid].today+=cnt;
      if(date.startsWith(ym)) agg[pid].month+=cnt;
    });
  });
  const prows=Object.entries(agg).sort((a,b)=> b[1].month-a[1].month);
  $('pageBody').innerHTML = prows.length
    ? prows.map(([pid,o])=>`<tr><td>${PAGE_LABEL[pid]||pid} <span class="muted" style="font-size:11px;">(${pid})</span></td><td class="num">${o.today}</td><td class="num">${o.month}</td><td class="num">${o.total}</td></tr>`).join('')
    : `<tr><td colspan="4" class="muted" style="text-align:center;padding:24px;">아직 데이터가 없습니다.</td></tr>`;
}

function drawChart(data){
  const W=560, H=220, pad={l:34,r:14,t:16,b:28};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const maxV=Math.max(10, ...data.map(d=>d.pv));
  const x=i=> pad.l + (data.length<=1?0: i*(iw/(data.length-1)));
  const yv=v=> pad.t + ih - (v/maxV)*ih;
  const areaPts=data.map((d,i)=>`${x(i)},${yv(d.pv)}`).join(' ');
  const area=`${pad.l},${pad.t+ih} ${areaPts} ${pad.l+iw},${pad.t+ih}`;
  const uvLine=data.map((d,i)=>`${x(i)},${yv(d.visits)}`).join(' ');
  const ticks=[0,Math.round(maxV/2),maxV];
  let g='';
  ticks.forEach(tk=>{ const yy=yv(tk); g+=`<line x1="${pad.l}" y1="${yy}" x2="${pad.l+iw}" y2="${yy}" stroke="rgba(255,255,255,.07)"/><text x="${pad.l-8}" y="${yy+3}" fill="rgba(255,255,255,.4)" font-size="9" text-anchor="end">${tk}</text>`; });
  data.forEach((d,i)=>{ g+=`<text x="${x(i)}" y="${H-9}" fill="rgba(255,255,255,.4)" font-size="9" text-anchor="middle">${d.k}</text>`; });
  const dots=data.map((d,i)=>`<circle cx="${x(i)}" cy="${yv(d.visits)}" r="3" fill="#cb1f2f"/>`).join('');
  $('chart').innerHTML=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${g}
    <polygon points="${area}" fill="rgba(203,31,47,.16)"/>
    <polyline points="${areaPts}" fill="none" stroke="rgba(203,31,47,.5)" stroke-width="1.5"/>
    <polyline points="${uvLine}" fill="none" stroke="#cb1f2f" stroke-width="2"/>
    ${dots}
  </svg>`;
}

async function loadInquiries(){
  let docs=[];
  try{
    const q=query(collection(db,'inquiries'), orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    snap.forEach(d=> docs.push({id:d.id, ...d.data()}));
  }catch(e){
    // 인덱스/정렬 문제 시 정렬 없이 재시도
    const snap=await getDocs(collection(db,'inquiries'));
    snap.forEach(d=> docs.push({id:d.id, ...d.data()}));
    docs.sort((a,b)=> (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }
  $('inqCount').textContent=docs.length;
  if(!docs.length){ $('inqBody').innerHTML=''; $('inqEmpty').style.display='block'; return; }
  $('inqEmpty').style.display='none';
  $('inqBody').innerHTML = docs.map(d=>{
    const dt = d.createdAt?.toDate ? d.createdAt.toDate() : null;
    const ds = dt ? dt.toLocaleString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
    const esc=s=> (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    return `<tr>
      <td class="muted" style="white-space:nowrap;">${ds}</td>
      <td>${esc(d.region)||'-'}</td>
      <td>${esc(d.name)||'-'}</td>
      <td style="white-space:nowrap;">${esc(d.tel)||'-'}</td>
      <td class="inq-content">${esc(d.content)||'<span class="muted">(내용 없음)</span>'}</td>
      <td class="muted">${esc(d.page)||'-'}</td>
      <td><button class="del-btn" data-id="${d.id}">삭제</button></td>
    </tr>`;
  }).join('');
  document.querySelectorAll('.del-btn').forEach(b=>{
    b.addEventListener('click', async ()=>{
      if(!confirm('이 문의를 삭제할까요? 되돌릴 수 없습니다.')) return;
      try{ await deleteDoc(doc(db,'inquiries', b.dataset.id)); loadInquiries(); }
      catch(e){ alert('삭제 실패: 권한을 확인하세요.'); }
    });
  });
}
</script>
</body>
</html>
